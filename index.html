<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency-Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <header>CURRENCY CONVERTER</header>
        <form>

            <div class="convert-box">
                <div class="select-container">
                    <img src="https://flagsapi.com/US/flat/48.png">
                    <select name="from"></select>
                </div>
                <div class="amount"><input type="number" value="1"></div>
            </div>

            <div style="display: flex; justify-content: center; margin: 5px 0;">
                <div class="swap-btn">
                    <img src="../images/two-arrows.png" class="swap-img">
                </div>
            </div>

            <div class="convert-box">
                <div class="select-container">
                    <img src="https://flagsapi.com/IN/flat/48.png">
                    <select name="to"></select>
                </div>
                <div class="amount"><input type="text" value="0"></div>
            </div>
    
            <div class="btn-div">
                <button>CONVERT NOW</button>
            </div>

        </form>
    </main>

    <script src="codes.js"></script>
    <script src="logic.js"></script>

</body>
</html>
